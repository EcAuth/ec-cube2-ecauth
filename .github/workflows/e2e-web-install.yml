name: E2E (Web Install)

# tar.gz をビルドし、SKIP_PLUGIN_INSTALL=true で素の EC-CUBE 2 を起動した上で
# 管理画面「オーナーズストア > プラグインを追加する」経由のインストールを E2E 検証する。
# このワークフローが通っている = 本番と同じ Web インストール経路で動く保証。

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-web-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin tar.gz
        run: |
          chmod +x tools/build-archive.sh
          ./tools/build-archive.sh

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: EcAuthLogin2-archive
          path: dist/EcAuthLogin2-*.tar.gz

      - name: Start EC-CUBE 2 without auto plugin install
        env:
          SKIP_PLUGIN_INSTALL: 'true'
        run: |
          docker compose up -d --build
          # Wait for EC-CUBE to become ready
          for i in $(seq 1 60); do
            if curl -sk "https://localhost:8081/" >/dev/null 2>&1; then
              echo "EC-CUBE is up"
              break
            fi
            sleep 2
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run web-install E2E
        env:
          ECCUBE_BASE_URL: 'https://localhost:8081'
          ECCUBE_ADMIN_BASE: '/admin/'
          ECCUBE_ADMIN_LOGIN_ID: admin
          ECCUBE_ADMIN_PASSWORD: password
        run: npx playwright test tests/web-install.spec.ts --reporter=list

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose logs --no-color > docker-compose.log || true

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: |
            test-results/
            playwright-report/
            docker-compose.log
