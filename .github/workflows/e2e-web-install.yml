name: E2E (Web Install)

# tar.gz をビルドし、SKIP_PLUGIN_INSTALL=true で素の EC-CUBE 2 を起動した上で
# 管理画面「オーナーズストア > プラグインを追加する」経由のインストールを E2E 検証する。
# このワークフローが通っている = 本番と同じ Web インストール経路で動く保証。

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-web-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin tar.gz
        run: |
          chmod +x tools/build-archive.sh
          ./tools/build-archive.sh

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: EcAuthLogin2-archive
          path: dist/EcAuthLogin2-*.tar.gz

      - name: Generate randomized ADMIN_DIR
        # ADMIN_DIR がランダム化された本番想定環境でも Web インストール経路が
        # 機能することを実証する。形式は前後にスラッシュ付き（例: /admin_xxxx/）。
        run: |
          ADMIN_DIR="admin_$(openssl rand -hex 6)/"
          echo "ADMIN_DIR=${ADMIN_DIR}" >> "$GITHUB_ENV"
          echo "ECCUBE_ADMIN_BASE=/${ADMIN_DIR}" >> "$GITHUB_ENV"
          echo "[ci] randomized ADMIN_DIR=${ADMIN_DIR}"

      - name: Start EC-CUBE 2 without auto plugin install
        env:
          SKIP_PLUGIN_INSTALL: 'true'
          ADMIN_DIR: ${{ env.ADMIN_DIR }}
        run: |
          docker compose up -d --build
          # Wait for EC-CUBE to become ready (fail-fast on timeout to surface
          # readiness failures here instead of in later Playwright steps).
          # ADMIN_DIR がランダム化されているためルート / で確認する。
          ready=false
          for i in $(seq 1 60); do
            if curl -sk "https://localhost:8081/" >/dev/null 2>&1; then
              echo "EC-CUBE is up"
              ready=true
              break
            fi
            echo "Waiting for EC-CUBE... ($i/60)"
            sleep 2
          done
          if [ "$ready" != "true" ]; then
            echo "EC-CUBE did not become ready in time" >&2
            docker compose logs ec-cube --tail 100 || true
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run web-install E2E
        env:
          ECCUBE_BASE_URL: 'https://localhost:8081'
          ECCUBE_ADMIN_BASE: ${{ env.ECCUBE_ADMIN_BASE }}
          ECCUBE_ADMIN_LOGIN_ID: admin
          ECCUBE_ADMIN_PASSWORD: password
        run: npx playwright test tests/web-install.spec.ts --reporter=list

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose logs --no-color > docker-compose.log || true

      - name: Dump plugin DB state and filesystem on failure
        if: failure()
        run: |
          echo "=== dtb_plugin ==="
          docker compose exec -T postgres psql -U eccube_db_user -d eccube_db -c \
            "SELECT plugin_id, plugin_code, plugin_name, enable, class_name FROM dtb_plugin ORDER BY plugin_id;" || true
          echo "=== dtb_plugin_hookpoint ==="
          docker compose exec -T postgres psql -U eccube_db_user -d eccube_db -c \
            "SELECT plugin_id, hook_point, callback FROM dtb_plugin_hookpoint ORDER BY plugin_id;" || true
          echo "=== PLUGIN_UPLOAD_REALDIR contents ==="
          docker compose exec -T ec-cube ls -la /var/www/app/data/downloads/plugin/ || true
          docker compose exec -T ec-cube ls -la /var/www/app/data/downloads/plugin/EcAuthLogin2/ 2>&1 | head -20 || true
          echo "=== Apache error.log (last 100 lines) ==="
          docker compose exec -T ec-cube tail -100 /var/log/apache2/error.log 2>&1 || true

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: |
            test-results/
            playwright-report/
            docker-compose.log
